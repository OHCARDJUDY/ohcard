<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OH卡一對一探索回饋表</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
                    },
                    colors: {
                        muji: {
                            50: '#FAF8F5',   // 溫暖燕麥白 (背景)
                            100: '#F4EFEA',  // 淺棉麻色
                            200: '#E6DDD4',  // 溫和沙色 (細框線)
                            300: '#D5C7B7',  // 淺木色
                            400: '#A89685',  // 灰褐色
                            500: '#7E6E5F',  // 大地木質色 (深主色)
                            600: '#645649',  // 焦炭黑褐
                        },
                        moss: {
                            50: '#F3F5F2',   // 淡苔綠
                            100: '#E2E6DF',  // 嫩芽淺綠
                            200: '#C8D0C3',  // 霧面灰綠
                            500: '#707F6C',  // 療癒苔蘚綠 (進度條與強調色)
                            600: '#586555',
                        },
                        sand: {
                            100: '#F1EDE4',
                            200: '#E1DCD1',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #FAF8F5;
            background-image: 
                radial-gradient(at 15% 20%, rgba(244, 239, 234, 0.7) 0px, transparent 55%),
                radial-gradient(at 85% 80%, rgba(226, 230, 223, 0.5) 0px, transparent 55%);
            background-attachment: fixed;
        }
        
        /* 溫馨流砂背景微粒 */
        .ambient-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.45;
            z-index: 0;
            pointer-events: none;
            animation: float-blob 25s infinite alternate ease-in-out;
        }
        
        .blob-1 {
            width: 450px;
            height: 450px;
            background-color: #E2E6DF; /* 苔綠 */
            top: 10%;
            left: -10%;
            animation-duration: 28s;
        }
        
        .blob-2 {
            width: 500px;
            height: 500px;
            background-color: #F4EFEA; /* 棉麻 */
            bottom: 5%;
            right: -10%;
            animation-duration: 32s;
        }

        .blob-3 {
            width: 350px;
            height: 350px;
            background-color: #F1EDE4; /* 沙黃 */
            top: 45%;
            left: 60%;
            animation-duration: 22s;
        }

        @keyframes float-blob {
            0% { transform: translate(0px, 0px) scale(1); }
            50% { transform: translate(40px, -60px) scale(1.15); }
            100% { transform: translate(-30px, 30px) scale(0.9); }
        }
        
        /* 圓潤無印風主卡片 */
        .muji-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(230, 221, 212, 0.8);
            box-shadow: 0 10px 30px -5px rgba(126, 110, 95, 0.04);
        }

        .smooth-transition {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 自訂滾動條 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #FAF8F5;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #E6DDD4;
            border-radius: 99px;
        }
    </style>
</head>
<body class="font-sans text-stone-700 min-h-screen flex flex-col justify-between antialiased relative overflow-x-hidden">

    <!-- 暖調背景光暈 -->
    <div class="ambient-blob blob-1"></div>
    <div class="ambient-blob blob-2"></div>
    <div class="ambient-blob blob-3"></div>

    <header class="w-full max-w-4xl mx-auto px-6 pt-10 pb-4 flex justify-between items-center z-10">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-2xl bg-muji-100 flex items-center justify-center text-muji-500 border border-muji-200">
                <i class="fa-regular fa-compass text-lg"></i>
            </div>
            <div>
                <span class="block font-bold text-stone-800 tracking-wide text-base">內在覺察探尋</span>
                <span class="block text-[10px] text-muji-400 font-medium tracking-widest uppercase">OH Card Exploration</span>
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4 z-10">
        
        <!-- 問卷卡片 (超大圓角32px) -->
        <div id="survey-card" class="w-full max-w-2xl muji-card rounded-[32px] overflow-hidden smooth-transition relative p-1">
            
            <!-- 懸浮式極簡圓潤進度條 -->
            <div class="px-8 md:px-12 pt-8">
                <div class="w-full bg-muji-100 h-2 rounded-full overflow-hidden relative">
                    <div id="progress-bar" class="absolute top-0 left-0 bg-moss-500 h-full w-[0%] rounded-full smooth-transition" style="transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);"></div>
                </div>
            </div>

            <!-- 卡片內容區 -->
            <div class="px-8 pb-10 pt-6 md:px-12 md:pb-12">
                
                <!-- 歡迎引言/首頁 -->
                <div id="step-welcome" class="space-y-8">
                    <div class="space-y-4">
                        <div>
                            <span class="inline-block px-4 py-1.5 rounded-full bg-moss-50 text-moss-500 text-xs font-medium border border-moss-200/50">
                                一對一探索回饋
                            </span>
                        </div>
                        <h1 class="text-2xl md:text-3xl font-bold text-stone-800 tracking-tight leading-tight">
                            OH卡一對一探索回饋表
                        </h1>
                        <!-- 個案編號顯示（若網址帶有 ?case= 參數才會顯示） -->
                        <div id="case-id-display" class="hidden">
                            <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-stone-100 text-stone-500 text-xs font-medium border border-stone-200">
                                <i class="fa-regular fa-id-badge"></i>
                                <span>個案編號：<span id="case-id-text"></span></span>
                            </span>
                        </div>
                    </div>
                    
                    <div class="p-6 rounded-3xl bg-muji-50 border border-muji-200/60 space-y-4 text-stone-600 text-sm md:text-base leading-relaxed">
                        <p class="font-medium text-stone-800">謝謝你願意陪自己走這一段路，也謝謝你讓我有機會陪伴你一起探索。</p>
                        <p>這份回饋表大約需要 2 分鐘，希望能了解你的感受，也幫助我持續優化未來的一對一服務。</p>
                    </div>

                    <!-- 稱呼 -->
                    <div class="space-y-3">
                        <label class="block text-sm font-semibold text-stone-700 px-1">
                            請問該如何稱呼您？ <span class="text-stone-400 font-normal text-xs">(選填)</span>
                        </label>
                        <input type="text" id="respondent-name" placeholder="您的稱呼或暱稱" class="w-full px-5 py-3.5 rounded-2xl border border-muji-200 bg-white/60 focus:bg-white focus:outline-none focus:border-muji-500 focus:ring-4 focus:ring-muji-100 smooth-transition text-sm md:text-base">
                    </div>

                    <div class="pt-2">
                        <button onclick="startSurvey()" class="w-full md:w-auto px-8 py-3.5 rounded-full bg-muji-500 hover:bg-muji-600 text-white font-medium text-sm tracking-wider smooth-transition shadow-sm flex items-center justify-center gap-2 hover:shadow-md transform hover:-translate-y-0.5">
                            <span>開始填寫回饋</span>
                            <i class="fa-solid fa-arrow-right text-xs"></i>
                        </button>
                    </div>
                </div>

                <div id="survey-questions" class="hidden space-y-6">
                    <!-- 問題標題區 -->
                    <div class="flex justify-between items-center pb-4 border-b border-muji-200/60">
                        <span id="question-index" class="text-xs font-semibold tracking-wider text-muji-400 uppercase">問題 1 / 6</span>
                        <span class="text-xs text-stone-400 hover:text-stone-600 cursor-pointer smooth-transition flex items-center gap-1" onclick="restartSurvey()">
                            <i class="fa-solid fa-rotate-left"></i>重新開始
                        </span>
                    </div>

                    <!-- 問題動態插入處 -->
                    <div id="active-question-container" class="min-h-[220px] flex flex-col justify-center">
                        <!-- 由 JavaScript 動態生成問題 -->
                    </div>

                    <!-- 上一步/下一步導覽按鈕 -->
                    <div class="flex justify-between items-center pt-6 gap-4 border-t border-muji-200/40">
                        <button id="prev-btn" onclick="prevStep()" class="px-6 py-3 rounded-full border border-muji-200 bg-white hover:bg-muji-50 text-stone-600 text-xs font-medium smooth-transition flex items-center gap-1.5 hover:shadow-sm">
                            <i class="fa-solid fa-chevron-left text-xs"></i>
                            <span>上一題</span>
                        </button>
                        <button id="next-btn" onclick="nextStep()" class="px-8 py-3 rounded-full bg-muji-500 hover:bg-muji-600 text-white text-xs font-medium smooth-transition flex items-center gap-2 shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                            <span id="next-btn-text">下一題</span>
                            <i id="next-btn-icon" class="fa-solid fa-chevron-right text-xs"></i>
                        </button>
                    </div>
                </div>

                <div id="thank-you-screen" class="hidden py-8 space-y-6 text-center">
                    <div class="w-16 h-16 rounded-full bg-moss-50 border border-moss-200 flex items-center justify-center text-moss-500 mx-auto shadow-sm">
                        <i class="fa-solid fa-check text-2xl"></i>
                    </div>
                    <div class="space-y-4">
                        <h2 class="text-xl font-bold text-stone-800">感謝您的填寫與分享</h2>
                        <div class="max-w-md mx-auto p-6 rounded-[24px] bg-muji-50 border border-muji-200/60 text-stone-600 text-sm leading-relaxed space-y-3">
                            <p class="font-medium text-stone-800">「謝謝你願意陪自己走這一段路，也謝謝你讓我能陪伴你一同探索。」</p>
                            <p>您寶貴的回饋將被悉心珍藏，這也是我未來持續優化一對一服務的重要指引與溫暖力量。</p>
                            <div class="h-[1px] bg-muji-200/60 my-2"></div>
                            <p class="font-medium text-moss-500 text-sm">願這份覺察與平靜，在你的日常中溫和地延續 🌱</p>
                        </div>
                    </div>
                    <div class="pt-4">
                        <button onclick="restartSurvey()" class="px-8 py-3 rounded-full border border-muji-200 bg-white hover:bg-muji-50 text-stone-700 text-xs font-medium smooth-transition shadow-sm inline-flex items-center gap-1.5 mx-auto hover:shadow">
                            <i class="fa-solid fa-house text-xs"></i>
                            <span>返回問卷首頁</span>
                        </button>
                    </div>
                </div>

            </div>
        </div>

    </main>

    <footer class="w-full text-center py-8 text-xs text-stone-400 font-light z-10 border-t border-muji-200/20">
        © 2026 內在覺察探尋工坊 · 溫柔相伴
    </footer>

    <!-- 自定義雙圓角按鈕彈窗 -->
    <div id="custom-modal" class="fixed inset-0 bg-stone-900/10 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-[28px] p-7 max-w-md w-full shadow-xl space-y-5 border border-muji-200 transform scale-95 transition-all">
            <div class="flex items-start gap-3.5">
                <div id="modal-icon-container" class="w-10 h-10 rounded-2xl flex items-center justify-center text-base shadow-sm flex-shrink-0"></div>
                <div class="space-y-1">
                    <h4 id="modal-title" class="font-bold text-stone-800 text-base">提示</h4>
                    <p id="modal-message" class="text-stone-500 text-xs leading-relaxed font-normal"></p>
                </div>
            </div>
            <div class="flex justify-end items-center gap-2.5 pt-1" id="modal-actions-container">
                <!-- 動態注入按鈕 -->
            </div>
        </div>
    </div>

    <script>
        // Google Apps Script 雲端資料庫網址
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbw2_-ZXrc-j1znS4Ib2m7ut1GqnJ7Uxx3w8lUMy-bT8AjGFJlRDQ1e8l4rF0zTR0LC8dg/exec';

        // 從網址讀取個案編號，例如：?case=A001
        const urlParams = new URLSearchParams(window.location.search);
        const caseId = urlParams.get('case') || '';

        // 若有個案編號，於頁面上顯示
        if (caseId) {
            document.getElementById('case-id-text').textContent = caseId;
            document.getElementById('case-id-display').classList.remove('hidden');
        }

        // 題目定義 (6題)
        const questions = [
            {
                id: 'q1',
                type: 'checkbox',
                title: '結束今天的對談後，你現在的狀態比較接近：',
                hint: '可複選，請找出最貼近當下心境的選項。',
                options: [
                    '心裡有比較清楚的方向',
                    '對自己有新的發現',
                    '有些情緒正在整理中',
                    '覺得被理解與接住',
                    '還需要一點時間消化',
                    '更知道下一步可以做什麼'
                ],
                hasOther: true,
                required: false
            },
            {
                id: 'q2',
                type: 'checkbox',
                title: '今天哪個部分對你最有幫助？',
                hint: '可複選，幫助我們了解引導的切入點。',
                options: [
                    'OH卡牌面探索',
                    '引導提問',
                    '整理想法與感受',
                    '看見新的可能性',
                    '行動方向討論'
                ],
                hasOther: true,
                required: false
            },
            {
                id: 'q3',
                type: 'paragraph',
                title: '對談結束後，你覺得自己最大的收穫是什麼？',
                hint: '請用一段話分享您誠實的獲得與感觸。',
                placeholder: '寫下您的感受或新發現...',
                required: true
            },
            {
                id: 'q4',
                type: 'paragraph',
                title: '如果你願意推薦這次體驗給你的朋友，你會怎麼向他形容本次的探索呢？',
                hint: '想像你在跟親近的朋友分享，用最真實的話語來形容。',
                placeholder: '例如：這是一個可以幫助自己認識自己的工具，可以看到自己的卡點。',
                required: false
            },
            {
                id: 'q5',
                type: 'paragraph',
                title: '有沒有什麼想對我說的話，或希望未來可以調整的地方？',
                hint: '不論是鼓勵還是建議，都是我前進的動力。',
                placeholder: '任何想說的真心話或建議...',
                required: false
            },
            {
                id: 'q6',
                type: 'radio',
                title: '回饋分享意願調查',
                hint: '若您同意，我會將回饋匿名分享於社群平台，陪伴更多正在探索自己的人。',
                options: [
                    '可以匿名引用',
                    '可以分享，但請不要完整引用',
                    '暫時不希望公開分享'
                ],
                required: true
            }
        ];

        let currentStep = -1; // -1: 首頁, 0 ~ 5: 題目步驟, 6: 完成
        let formData = {
            name: '',
            answers: {}
        };

        // 開展問卷流程
        function startSurvey() {
            const nameInput = document.getElementById('respondent-name');
            formData.name = nameInput.value.trim() || '匿名的探索者';
            
            document.getElementById('step-welcome').classList.add('hidden');
            document.getElementById('survey-questions').classList.remove('hidden');
            
            currentStep = 0;
            renderQuestion();
            updateProgress();
        }

        // 重新開始
        function restartSurvey() {
            currentStep = -1;
            formData = { name: '', answers: {} };
            document.getElementById('respondent-name').value = '';
            
            document.getElementById('survey-card').classList.remove('hidden');
            document.getElementById('survey-questions').classList.add('hidden');
            document.getElementById('step-welcome').classList.remove('hidden');
            document.getElementById('thank-you-screen').classList.add('hidden');
            
            updateProgress();
        }

        // 更新進度條
        function updateProgress() {
            const bar = document.getElementById('progress-bar');
            if (currentStep === -1) {
                bar.style.width = '0%';
            } else {
                const percentage = Math.round(((currentStep + 1) / questions.length) * 100);
                bar.style.width = `${percentage}%`;
            }
        }

        // 渲染題目卡片
        function renderQuestion() {
            if (currentStep < 0 || currentStep >= questions.length) return;
            
            const q = questions[currentStep];
            const container = document.getElementById('active-question-container');
            const indexLabel = document.getElementById('question-index');
            
            indexLabel.innerHTML = `問題 ${currentStep + 1} / ${questions.length}`;
            
            const nextBtnText = document.getElementById('next-btn-text');
            const nextBtnIcon = document.getElementById('next-btn-icon');
            if (currentStep === questions.length - 1) {
                nextBtnText.textContent = '提交回饋';
                nextBtnIcon.className = 'fa-solid fa-check text-xs';
            } else {
                nextBtnText.textContent = '下一題';
                nextBtnIcon.className = 'fa-solid fa-chevron-right text-xs';
            }

            const savedVal = formData.answers[q.id];

            let html = `
                <div class="space-y-4">
                    <div>
                        <h3 class="text-base md:text-lg font-bold text-stone-800 leading-snug flex items-center gap-2">
                            <span>${q.title}</span>
                            ${q.required ? '<span class="text-[10px] text-moss-500 px-3 py-1 rounded-full bg-moss-50 border border-moss-200/50 flex-shrink-0 font-medium">必填</span>' : ''}
                        </h3>
                        <p class="text-xs text-stone-400 font-normal mt-1.5 px-0.5">${q.hint}</p>
                    </div>
                    <div class="space-y-2.5 pt-2">
            `;

            if (q.type === 'checkbox') {
                q.options.forEach((opt, idx) => {
                    const isChecked = savedVal && savedVal.options && savedVal.options.includes(opt);
                    html += `
                        <label class="flex items-center gap-3.5 p-4 rounded-2xl border border-muji-200 bg-white/40 hover:bg-white transition-all cursor-pointer select-none hover:shadow-sm transform hover:-translate-y-0.5">
                            <input type="checkbox" name="${q.id}_option" value="${opt}" ${isChecked ? 'checked' : ''} class="w-4 h-4 text-moss-500 border-muji-200 rounded-lg focus:ring-moss-200">
                            <span class="text-stone-700 text-sm md:text-base font-normal">${opt}</span>
                        </label>
                    `;
                });

                if (q.hasOther) {
                    const hasOtherVal = savedVal && savedVal.otherSelected;
                    const otherText = savedVal && savedVal.otherText ? savedVal.otherText : '';
                    html += `
                        <div class="space-y-2">
                            <label class="flex items-center gap-3.5 p-4 rounded-2xl border border-muji-200 bg-white/40 hover:bg-white transition-all cursor-pointer select-none hover:shadow-sm transform hover:-translate-y-0.5">
                                <input type="checkbox" id="${q.id}_other_check" onchange="toggleOtherInput('${q.id}')" ${hasOtherVal ? 'checked' : ''} class="w-4 h-4 text-moss-500 border-muji-200 rounded-lg focus:ring-moss-200">
                                <span class="text-stone-700 text-sm md:text-base font-normal">其他</span>
                            </label>
                            <input type="text" id="${q.id}_other_text" placeholder="請在此填寫..." value="${otherText}" class="w-full px-5 py-3.5 rounded-2xl border border-muji-200 bg-white/60 focus:bg-white focus:outline-none focus:border-muji-500 focus:ring-4 focus:ring-muji-100 smooth-transition text-sm ${hasOtherVal ? '' : 'hidden'}">
                        </div>
                    `;
                }
            } else if (q.type === 'radio') {
                q.options.forEach((opt, idx) => {
                    const isChecked = savedVal && savedVal.selected === opt;
                    html += `
                        <label class="flex items-center gap-3.5 p-4 rounded-2xl border border-muji-200 bg-white/40 hover:bg-white transition-all cursor-pointer select-none hover:shadow-sm transform hover:-translate-y-0.5">
                            <input type="radio" name="${q.id}_option" value="${opt}" ${isChecked ? 'checked' : ''} class="w-4 h-4 text-moss-500 border-muji-200 focus:ring-moss-200">
                            <span class="text-stone-700 text-sm md:text-base font-normal">${opt}</span>
                        </label>
                    `;
                });
            } else if (q.type === 'paragraph') {
                const textVal = savedVal && savedVal.text ? savedVal.text : '';
                html += `
                    <textarea id="${q.id}_textarea" rows="4" placeholder="${q.placeholder}" class="w-full px-5 py-3.5 rounded-2xl border border-muji-200 bg-white/60 focus:bg-white focus:outline-none focus:border-muji-500 focus:ring-4 focus:ring-muji-100 smooth-transition text-sm md:text-base custom-scrollbar font-normal leading-relaxed">${textVal}</textarea>
                `;
            }

            html += `
                    </div>
                </div>
            `;

            container.innerHTML = html;
            
            const prevBtn = document.getElementById('prev-btn');
            if (currentStep === 0) {
                prevBtn.classList.add('invisible');
            } else {
                prevBtn.classList.remove('invisible');
            }
        }

        function toggleOtherInput(qid) {
            const checkbox = document.getElementById(`${qid}_other_check`);
            const textInput = document.getElementById(`${qid}_other_text`);
            if (checkbox.checked) {
                textInput.classList.remove('hidden');
                textInput.focus();
            } else {
                textInput.classList.add('hidden');
                textInput.value = '';
            }
        }

        // 驗證輸入
        function validateStep() {
            const q = questions[currentStep];
            if (!q.required) return true;

            if (q.type === 'checkbox') {
                const checked = document.querySelectorAll(`input[name="${q.id}_option"]:checked`);
                const otherChecked = document.getElementById(`${q.id}_other_check`)?.checked || false;
                if (checked.length === 0 && !otherChecked) {
                    showModal('warning', '填答提示', '本題為必填題，請選擇至少一個合適的選項。');
                    return false;
                }
                if (otherChecked) {
                    const otherText = document.getElementById(`${q.id}_other_text`).value.trim();
                    if (!otherText) {
                        showModal('warning', '填答提示', '您勾選了「其他」，請於下方欄位填寫說明。');
                        return false;
                    }
                }
            } else if (q.type === 'radio') {
                const checked = document.querySelector(`input[name="${q.id}_option"]:checked`);
                if (!checked) {
                    showModal('warning', '填答提示', '本題為必填題，請點選一個選項。');
                    return false;
                }
            } else if (q.type === 'paragraph') {
                const text = document.getElementById(`${q.id}_textarea`).value.trim();
                if (!text) {
                    showModal('warning', '填答提示', '本題為必填題，請寫下您的想法。');
                    return false;
                }
            }
            return true;
        }

        // 暫存資料
        function saveStepData() {
            const q = questions[currentStep];
            if (q.type === 'checkbox') {
                const checkedOpts = Array.from(document.querySelectorAll(`input[name="${q.id}_option"]:checked`)).map(el => el.value);
                const otherSelected = document.getElementById(`${q.id}_other_check`)?.checked || false;
                const otherText = otherSelected ? document.getElementById(`${q.id}_other_text`).value.trim() : '';
                
                formData.answers[q.id] = {
                    options: checkedOpts,
                    otherSelected,
                    otherText
                };
            } else if (q.type === 'radio') {
                const selected = document.querySelector(`input[name="${q.id}_option"]:checked`)?.value || '';
                formData.answers[q.id] = {
                    selected
                };
            } else if (q.type === 'paragraph') {
                const text = document.getElementById(`${q.id}_textarea`).value.trim();
                formData.answers[q.id] = {
                    text
                };
            }
        }

        function prevStep() {
            if (currentStep > 0) {
                saveStepData();
                currentStep--;
                renderQuestion();
                updateProgress();
            }
        }

        function nextStep() {
            if (!validateStep()) return;
            
            saveStepData();
            
            if (currentStep < questions.length - 1) {
                currentStep++;
                renderQuestion();
                updateProgress();
            } else {
                submitSurvey();
            }
        }

        // 提交問卷
        function submitSurvey() {
            document.getElementById('survey-questions').classList.add('hidden');
            document.getElementById('thank-you-screen').classList.remove('hidden');

            const submissionRecord = {
                id: Date.now().toString(),
                caseId: caseId,
                timestamp: new Date().toLocaleString('zh-TW'),
                name: formData.name,
                answers: JSON.parse(JSON.stringify(formData.answers))
            };

            // 傳送到雲端 Google Sheet
            fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(submissionRecord)
            }).catch(err => console.log("雲端同步失敗", err));

            currentStep = questions.length;
            updateProgress();
        }

        // 自定義簡約雙圓角彈窗
        function showModal(type, title, message) {
            const modal = document.getElementById('custom-modal');
            const iconContainer = document.getElementById('modal-icon-container');
            const titleEl = document.getElementById('modal-title');
            const messageEl = document.getElementById('modal-message');
            const actionsContainer = document.getElementById('modal-actions-container');

            titleEl.textContent = title;
            messageEl.textContent = message;

            if (type === 'success') {
                iconContainer.className = 'w-10 h-10 rounded-2xl flex items-center justify-center text-base bg-moss-50 border border-moss-200 text-moss-500 flex-shrink-0';
                iconContainer.innerHTML = '<i class="fa-solid fa-check"></i>';
            } else if (type === 'warning') {
                iconContainer.className = 'w-10 h-10 rounded-2xl flex items-center justify-center text-base bg-muji-50 border border-muji-200 text-muji-500 flex-shrink-0';
                iconContainer.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i>';
            } else {
                iconContainer.className = 'w-10 h-10 rounded-2xl flex items-center justify-center text-base bg-stone-50 border border-stone-200 text-stone-500 flex-shrink-0';
                iconContainer.innerHTML = '<i class="fa-solid fa-info"></i>';
            }

            // 單一確認按鈕
            actionsContainer.innerHTML = `
                <button onclick="closeModal()" class="px-6 py-2.5 bg-muji-500 hover:bg-muji-600 text-white rounded-full text-xs font-medium smooth-transition shadow-sm">
                    確認
                </button>
            `;

            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('custom-modal').classList.add('hidden');
        }
    </script>
</body>
</html>
