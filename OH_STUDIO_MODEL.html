<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OH Studio — 探索工作區 v3</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/tabler-icons.min.css" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap');
:root{--bg:#F6F0E4;--surface:#FFFCF5;--surface-2:#FBF5E9;--ink:#2B241D;--ink-soft:#736452;--ink-faint:#A4937C;--plum:#4A2444;--plum-soft:#7A4E72;--plum-pale:#EFE2EC;--gold:#AE8429;--gold-pale:#F1E5C6;--line:#E2D4B8;--danger:#963A3A;--danger-pale:#F4E1DD;--radius:10px;--shadow:0 1px 2px rgba(43,36,29,0.06),0 4px 14px rgba(43,36,29,0.06);}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Noto Sans TC',sans-serif;font-size:15px;line-height:1.6;}
.app{max-width:940px;margin:0 auto;padding:24px 18px 80px;}
.topbar{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--line);}
.brand h1{font-family:'Noto Serif TC',serif;font-weight:700;font-size:22px;margin:0;}
.brand p{margin:2px 0 0;font-size:12.5px;color:var(--ink-soft);}
.back-link{color:var(--plum);cursor:pointer;font-size:14px;}
.snapshot{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:22px;box-shadow:var(--shadow);overflow:hidden;}
.snapshot-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--surface-2);border-bottom:1px solid var(--line);}
.snapshot-title-group{display:flex;align-items:center;gap:12px;}
.snapshot-number{width:28px;height:28px;border-radius:50%;background:var(--plum);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;}
.snapshot-title{font-size:16px;font-weight:600;}
.snapshot-body{padding:18px;}
.subhead{font-size:13px;font-weight:600;color:var(--ink-soft);margin:0 0 10px;display:flex;align-items:center;gap:6px;}
.subhead:not(:first-child){margin-top:20px;}

/* Photo upload */
.photo-upload{border:2px dashed var(--line);border-radius:8px;padding:16px;text-align:center;color:var(--ink-faint);cursor:pointer;margin-bottom:16px;font-size:13px;}
.photo-upload:hover{border-color:var(--plum);color:var(--plum);}
.photo-preview{max-width:100%;border-radius:8px;margin-bottom:16px;}

/* Card set - word cards as frames holding image cards */
.cardset{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-start;margin-bottom:16px;padding:16px;background:var(--surface-2);border-radius:8px;min-height:120px;}
.card-frame{border:2px solid var(--gold);border-radius:10px;padding:8px;background:var(--gold-pale);display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;}
.card-frame-label{font-size:13px;font-weight:700;color:var(--gold);}
.card-frame-inner{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;min-width:76px;min-height:100px;align-items:center;}
.img-card{position:relative;width:66px;height:92px;border-radius:6px;overflow:hidden;border:1px solid var(--line);}
.img-card img{width:100%;height:100%;object-fit:cover;display:block;}
.img-card .num{position:absolute;top:1px;left:1px;background:rgba(0,0,0,0.6);color:#fff;font-size:9px;padding:0 3px;border-radius:2px;}
.img-card .rm{position:absolute;top:1px;right:1px;background:rgba(150,58,58,0.9);color:#fff;width:14px;height:14px;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.add-img-in-frame{width:66px;height:92px;border:1px dashed var(--gold);border-radius:6px;background:transparent;color:var(--gold);cursor:pointer;font-size:20px;}
.frame-rm{position:absolute;top:-8px;right:-8px;background:var(--danger);color:#fff;width:20px;height:20px;border-radius:50%;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid var(--surface);}
.loose-img{position:relative;}
.add-card-controls{display:flex;flex-direction:column;gap:8px;}
.add-frame-btn,.add-loose-btn{padding:10px 14px;border:1px dashed var(--gold);border-radius:8px;background:transparent;color:var(--gold);cursor:pointer;font-size:13px;white-space:nowrap;}
.add-loose-btn{border-color:var(--plum-soft);color:var(--plum-soft);}
.free-word-note{font-size:11px;color:var(--ink-faint);margin-top:4px;}

/* Per-card + integrated story */
.field{display:flex;flex-direction:column;margin-bottom:14px;}
.field label{font-size:13px;font-weight:600;margin-bottom:6px;color:var(--ink);}
.field textarea,.field input{padding:10px 12px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface-2);color:var(--ink);font-family:inherit;font-size:14px;resize:vertical;}
.field textarea{min-height:60px;}
.field textarea:focus,.field input:focus{outline:none;border-color:var(--plum);box-shadow:0 0 0 3px var(--plum-pale);background:var(--surface);}
.integrated-story label{color:var(--plum);font-size:14px;font-weight:700;}
.percard-story{padding-left:12px;border-left:3px solid var(--gold-pale);}

/* Entities */
.entity-card{background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:10px;}
.entity-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.entity-name-input{font-size:15px;font-weight:600;border:none;background:transparent;color:var(--plum);padding:4px 0;border-bottom:1px solid var(--line);font-family:inherit;}
.entity-name-input:focus{outline:none;border-bottom-color:var(--plum);}
.entity-remove{color:var(--danger);cursor:pointer;font-size:13px;}
.entity-controls{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:600px){.entity-controls{grid-template-columns:1fr;}}
.pos-mode-tabs{display:flex;gap:4px;margin-bottom:10px;}
.pos-mode-btn{flex:1;padding:6px;font-size:12px;border:1px solid var(--line);background:var(--surface);border-radius:6px;cursor:pointer;color:var(--ink-soft);font-family:inherit;}
.pos-mode-btn.active{background:var(--plum);color:#fff;border-color:var(--plum);}
.position-grid-wrap{display:flex;justify-content:center;padding:8px;}
.outer-grid{display:grid;grid-template-columns:repeat(5,26px);grid-template-rows:repeat(5,26px);gap:2px;}
.grid-cell{background:var(--surface);border:1px solid var(--line);border-radius:3px;cursor:pointer;}
.grid-cell:hover{border-color:var(--plum-soft);}
.grid-cell.selected{background:var(--plum);border-color:var(--plum);}
.grid-cell.inner{background:var(--gold-pale);border-color:var(--gold);}
.grid-cell.inner.selected{background:var(--gold);border-color:var(--gold);}
.bird-wrap{display:none;padding:12px 0;}
.emotion-label{font-size:12px;color:var(--ink-soft);margin-bottom:8px;}
.emotion-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.emotion-name{font-size:13px;padding:4px 10px;background:var(--plum-pale);border-radius:999px;color:var(--plum);white-space:nowrap;}
.emotion-strength{flex:1;}
.emotion-val{font-size:12px;color:var(--ink-soft);min-width:20px;}
.emotion-presets{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.emo-chip{font-size:12px;padding:4px 10px;border:1px solid var(--plum-soft);background:transparent;border-radius:999px;color:var(--plum-soft);cursor:pointer;font-family:inherit;}
.emo-chip:hover{background:var(--plum-pale);}
.add-entity-btn{width:100%;padding:10px;background:transparent;border:1px dashed var(--line);border-radius:8px;color:var(--ink-soft);font-size:13px;cursor:pointer;margin-top:8px;font-family:inherit;}
.metrics-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;padding:14px;background:var(--surface-2);border-radius:8px;}
.metric-chip{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:8px 12px;}
.metric-chip-name{font-size:12px;color:var(--ink-soft);}
.metric-chip-val{font-size:13px;font-weight:600;color:var(--plum);min-width:16px;}
.add-metric-chip{padding:8px 12px;border:1px dashed var(--gold);background:transparent;border-radius:8px;color:var(--gold);font-size:12px;cursor:pointer;font-family:inherit;}

/* Closing section - client-facing outputs */
.closing{margin-top:20px;padding:16px;background:var(--plum-pale);border-radius:8px;border:1px solid var(--plum-soft);}
.closing-title{font-size:14px;font-weight:700;color:var(--plum);margin-bottom:12px;}
.closing .field textarea{background:var(--surface);}
.client-badge{display:inline-block;font-size:10px;padding:2px 8px;background:var(--gold);color:#fff;border-radius:999px;margin-left:8px;vertical-align:middle;}

.add-snapshot-btn{width:100%;padding:16px;background:var(--plum);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:var(--shadow);margin-top:8px;font-family:inherit;}
.add-snapshot-hint{text-align:center;font-size:12px;color:var(--ink-faint);margin-top:8px;}

/* Methodology section */
.methodology{margin-top:32px;padding:22px;background:var(--plum-pale);border:1px solid var(--plum-soft);border-radius:var(--radius);}
.methodology-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--plum-soft);}
.methodology-head i{font-size:26px;color:var(--plum);}
.methodology-title{font-size:17px;font-weight:700;color:var(--plum);}
.methodology-sub{font-size:12px;color:var(--plum-soft);margin-top:2px;}
.methodology .field select,.methodology .field textarea,.methodology .field input{background:var(--surface);}
.mtag-box{border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);padding:8px;}
.mtag-input{width:100%;border:none;background:transparent;padding:6px;font-family:inherit;font-size:14px;}
.mtag-input:focus{outline:none;}
.mtags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.mtag{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;background:var(--plum-pale);border:1px solid var(--plum-soft);border-radius:999px;font-size:12px;color:var(--plum);}
.mtag .x{cursor:pointer;font-weight:700;}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(43,36,29,0.4);z-index:1000;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.active{display:flex;}
.modal-content{background:var(--surface);border-radius:var(--radius);max-width:720px;width:100%;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid var(--line);}
.modal-title{font-size:17px;font-weight:600;}
.modal-close{font-size:24px;cursor:pointer;color:var(--ink-faint);border:none;background:none;}
.modal-tabs{display:flex;gap:8px;padding:12px 20px 0;}
.modal-tab{padding:8px 16px;border:none;background:transparent;border-bottom:2px solid transparent;cursor:pointer;font-size:14px;color:var(--ink-soft);font-family:inherit;}
.modal-tab.active{color:var(--plum);border-bottom-color:var(--plum);font-weight:600;}
.modal-search{padding:12px 20px;}
.modal-search input{width:100%;padding:10px 14px;border:1px solid var(--line);border-radius:var(--radius);font-size:14px;font-family:inherit;}
.modal-body{flex:1;overflow-y:auto;padding:0 20px 20px;}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:10px;}
.picker-card{cursor:pointer;border-radius:8px;overflow:hidden;border:2px solid transparent;background:var(--surface-2);}
.picker-card:hover{border-color:var(--plum);}
.picker-card-img{width:100%;aspect-ratio:5/7;}
.picker-card-img img{width:100%;height:100%;object-fit:cover;display:block;}
.picker-card-label{font-size:11px;text-align:center;padding:4px;color:var(--ink-soft);}
.word-list{display:flex;flex-wrap:wrap;gap:8px;}
.word-chip{padding:8px 14px;border:1px solid var(--line);border-radius:999px;cursor:pointer;font-size:13px;background:var(--surface-2);}
.word-chip:hover{border-color:var(--gold);background:var(--gold-pale);color:var(--gold);}
.word-chip.blank{border-style:dashed;color:var(--ink-faint);}
.free-word-box{margin-top:16px;padding-top:16px;border-top:1px solid var(--line);}
.free-word-box label{font-size:13px;font-weight:600;display:block;margin-bottom:6px;}
.free-word-box .hint{font-size:11px;color:var(--ink-faint);margin-bottom:8px;}
.custom-word-input{display:flex;gap:8px;}
.custom-word-input input{flex:1;padding:8px 12px;border:1px solid var(--line);border-radius:var(--radius);font-family:inherit;}
.custom-word-input button{padding:8px 16px;background:var(--plum-soft);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand"><h1>OH Studio</h1><p>SA004-1 • Nathalie • 探索工作區</p></div>
    <span class="back-link">← 回個案</span>
  </div>
  <div id="snapshotContainer"></div>
  <button class="add-snapshot-btn" onclick="addSnapshot()"><i class="ti ti-plus"></i> 新增探索快照</button>
  <div class="add-snapshot-hint">每次換牌，建立一個新快照。字卡是「框」，圖卡放進框裡；也可單放圖卡。</div>

  <!-- 方法論標籤區（整個探索層級，貢獻到 Judy Method Library） -->
  <div class="methodology">
    <div class="methodology-head">
      <i class="ti ti-books"></i>
      <div>
        <div class="methodology-title">方法論標籤</div>
        <div class="methodology-sub">標記這次探索對方法論庫的貢獻。長期累積，形成 Judy Method。</div>
      </div>
    </div>

    <div class="field">
      <label>個案類型（主述困擾）</label>
      <select>
        <option>— 選擇或新增 —</option>
        <option>缺乏行動力</option>
        <option>無法做決定</option>
        <option>容易放棄</option>
        <option>+ 新增新類型</option>
      </select>
    </div>

    <div class="field">
      <label>起因關鍵字（可多選）</label>
      <div class="mtag-box">
        <input type="text" class="mtag-input" placeholder="輸入關鍵字，按 Enter（例：低效能感）" onkeydown="if(event.key==='Enter'){addMTag(this,'cause');event.preventDefault();}">
        <div class="mtags" id="mtags-cause">
          <span class="mtag">低效能感（缺乏內在權威）<span class="x" onclick="this.parentElement.remove()">×</span></span>
        </div>
      </div>
    </div>

    <div class="field">
      <label>心理模式（成因鏈）</label>
      <select>
        <option>— 選擇或新增 —</option>
        <option>現況不滿→歸因過去→懷疑自己→害怕選擇→尋求外部擔保→不敢行動→卡關</option>
        <option>+ 新增新模式</option>
      </select>
    </div>

    <div class="field">
      <label>我的解牌思路與心路歷程</label>
      <textarea placeholder="你如何看出這個模式、你的內在反應、你的引導策略..." style="min-height:90px"></textarea>
    </div>

    <div class="field">
      <label>有效問句</label>
      <div class="mtag-box">
        <input type="text" class="mtag-input" placeholder="輸入問句，按 Enter" onkeydown="if(event.key==='Enter'){addMTag(this,'q');event.preventDefault();}">
        <div class="mtags" id="mtags-q"></div>
      </div>
    </div>

    <div class="field" style="margin-bottom:0">
      <label>有效卡牌組合</label>
      <div class="mtag-box">
        <input type="text" class="mtag-input" placeholder="描述組合，按 Enter" onkeydown="if(event.key==='Enter'){addMTag(this,'combo');event.preventDefault();}">
        <div class="mtags" id="mtags-combo"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="cardPickerModal">
  <div class="modal-content">
    <div class="modal-header"><div class="modal-title">選擇牌卡</div><button class="modal-close" onclick="closeCardPicker()">×</button></div>
    <div class="modal-tabs">
      <button class="modal-tab active" onclick="switchPickerTab('image')">圖卡 (88)</button>
      <button class="modal-tab" onclick="switchPickerTab('word')">字卡 (88+2)</button>
    </div>
    <div class="modal-search"><input type="text" id="cardSearchInput" placeholder="搜尋（圖卡：關鍵字；字卡：輸入「誇」→誇贊）..." oninput="filterCards(this.value)"></div>
    <div class="modal-body">
      <div class="card-grid" id="pickerCardGrid"></div>
      <div id="pickerWordList" style="display:none;">
        <div class="word-list" id="wordChipList"></div>
        <div class="free-word-box">
          <label>個案自創字卡</label>
          <div class="hint">客戶自己想的字（只屬這局，不會加入 88 張字卡庫）</div>
          <div class="custom-word-input"><input type="text" id="customWordInput" placeholder="例：自由飛翔"><button onclick="addFreeWord()">加入本局</button></div>
        </div>
      </div>
    </div>
  </div>
</div>

};

function cardToFileKey(cardNum){
  // 11/12/17/18 在資料夾裡各有一份重複檔(.jpeg與.jpg內容相同)，
  // 卡號與檔名是單純的 1:1 對應，不需位移。
  return String(cardNum).padStart(2,'0');
}

function cardImageId(cardNum){ return FILE_IDS[cardToFileKey(cardNum)]; }
function cardImgUrl(id){ return 'https://lh3.googleusercontent.com/d/' + id; }


// OH Studio — Word Cards (88 fixed + 2 blank, never expanded)
const WORD_CARDS = [
  "感情","違背","危險","奇妙","羞愧","孩童","男性","厭煩","前進","錯誤",
  "誇贊","女人","應該","歡笑","母親","姿態","權利遊戲","希望","專家","罪惡感",
  "遊戲","夢想","強迫","改變","退省","不喜歡","破壞","上司","受害者","憎恨",
  "付出","吸引","道歉","詼諧","成功","腐朽","外表","敵對","醜陋","生氣",
  "失敗","虧欠","丟臉","固執","尷尬","躲藏","等候","習慣","聰明","羞辱",
  "謊言","陌生人","喜悅","恐懼","弄巧成拙","奴隸","堅定","攫取","猶豫","愚蠢",
  "威脅","憎惡","孤獨","抗拒","攻擊","同性戀","哀傷","依賴","停止","混亂",
  "循環","疲憊","開始","幻想","父親","家","執著","分享","放開","愛情",
  "恐嚇","壓抑","焦慮","裸體","消除","順應","色情","痛苦"
];
const BLANK_CARDS = ["空白卡 A","空白卡 B"];


const PRESET_EMOTIONS = ['害怕','開心','驚嚇','生氣','難過','想要','不安'];
let customEmotions = [];
let snapshots = [];
let snapshotCounter = 0;
let currentPicker = { snapshotId:null, frameIdx:null, type:'image' };

function addSnapshot(){
  snapshotCounter++;
  snapshots.push({id:'s'+snapshotCounter, frames:[], looseImages:[], entities:[{name:'自己'}]});
  render();
}
function removeSnapshot(id){ snapshots = snapshots.filter(s=>s.id!==id); render(); }

function render(){
  document.getElementById('snapshotContainer').innerHTML = snapshots.map((s,i)=>snapHTML(s,i+1)).join('');
  buildGrids();
}

function snapHTML(s, num){
  return `<div class="snapshot">
    <div class="snapshot-header">
      <div class="snapshot-title-group"><div class="snapshot-number">${num}</div><div class="snapshot-title">探索快照 ${num}</div></div>
      <span class="entity-remove" onclick="removeSnapshot('${s.id}')">刪除快照</span>
    </div>
    <div class="snapshot-body">
      <div class="subhead"><i class="ti ti-camera"></i> 牌陣照片（選填）</div>
      <label class="photo-upload"><i class="ti ti-upload"></i> 點擊上傳實體牌陣照片（Phase 2 會自動辨識）<input type="file" accept="image/*" style="display:none" onchange="previewPhoto(this)"></label>

      <div class="subhead"><i class="ti ti-cards"></i> 牌組（字卡為框，圖卡放進框裡）</div>
      <div class="cardset">
        ${s.frames.map((f,fi)=>frameHTML(s.id,f,fi)).join('')}
        ${s.looseImages.map((img,li)=>`<div class="img-card loose-img"><span class="num">${String(img).padStart(2,'0')}</span><span class="rm" onclick="rmLoose('${s.id}',${li})">×</span><img src="${cardImgUrl(cardImageId(img))}" loading="lazy" referrerpolicy="no-referrer"></div>`).join('')}
        <div class="add-card-controls">
          <button class="add-frame-btn" onclick="openPicker('${s.id}',null,'word')">+ 字卡框</button>
          <button class="add-loose-btn" onclick="openPicker('${s.id}','loose','image')">+ 單放圖卡</button>
        </div>
      </div>

      <div class="subhead"><i class="ti ti-book"></i> 故事</div>
      <div class="field integrated-story">
        <label>統整故事（整組牌的故事）</label>
        <textarea placeholder="這組牌合起來，客戶說了什麼整體的故事..."></textarea>
      </div>
      <div class="field percard-story">
        <label>各卡故事（選填，一張圖一個故事）</label>
        <textarea placeholder="如果某張圖卡有單獨的故事，記在這..."></textarea>
      </div>

      <div class="subhead"><i class="ti ti-users"></i> 人物 / 物件</div>
      <div id="ent-${s.id}">${s.entities.map((e,ei)=>entHTML(s.id,e,ei)).join('')}</div>
      <button class="add-entity-btn" onclick="addEnt('${s.id}')">+ 新增人物 / 物件</button>

      <div class="metrics-row">
        <div class="metric-chip"><span class="metric-chip-name">亮度</span><input type="range" min="0" max="10" value="5" oninput="this.nextElementSibling.textContent=this.value" style="width:70px"><span class="metric-chip-val">5</span></div>
        <div class="metric-chip"><span class="metric-chip-name">熱度</span><input type="range" min="0" max="10" value="5" oninput="this.nextElementSibling.textContent=this.value" style="width:70px"><span class="metric-chip-val">5</span></div>
        <button class="add-metric-chip" onclick="addMetric(this)">+ 指標</button>
      </div>

      <div class="closing">
        <div class="closing-title">探索收尾</div>
        <div class="field"><label>個案的領會 / 特徵</label><textarea placeholder="客戶自己的發現、領悟、表現出的特徵..."></textarea></div>
        <div class="field"><label>潛意識提醒統整 <span class="client-badge">個案版輸出</span></label><textarea placeholder="這次探索浮現的潛意識訊息，會給個案看..."></textarea></div>
        <div class="field" style="margin-bottom:0"><label>最小行動方案 <span class="client-badge">個案版輸出</span></label><textarea placeholder="具體、可執行的下一步，會給個案看..."></textarea></div>
      </div>
    </div>
  </div>`;
}

function frameHTML(sid, frame, fi){
  return `<div class="card-frame">
    <span class="frame-rm" onclick="rmFrame('${sid}',${fi})">×</span>
    <span class="card-frame-label">${frame.word}</span>
    <div class="card-frame-inner">
      ${frame.images.map((img,ii)=>`<div class="img-card"><span class="num">${String(img).padStart(2,'0')}</span><span class="rm" onclick="rmFrameImg('${sid}',${fi},${ii})">×</span><img src="${cardImgUrl(cardImageId(img))}" loading="lazy" referrerpolicy="no-referrer"></div>`).join('')}
      <button class="add-img-in-frame" onclick="openPicker('${sid}',${fi},'image')">+</button>
    </div>
  </div>`;
}

function entHTML(sid, e, ei){
  return `<div class="entity-card">
    <div class="entity-head"><input class="entity-name-input" value="${e.name||''}" placeholder="人物名稱"><span class="entity-remove" onclick="rmEnt('${sid}',${ei})">移除</span></div>
    <div class="entity-controls">
      <div class="position-selector">
        <div class="pos-mode-tabs"><button class="pos-mode-btn active" onclick="posMode(this,'grid')">位置</button><button class="pos-mode-btn" onclick="posMode(this,'bird')">俰瞰</button></div>
        <div class="position-grid-wrap grid-view"><div class="outer-grid"></div></div>
        <div class="bird-wrap"><div class="emotion-label">離圖片距離（選填，大多無）</div><input type="range" min="1" max="10" value="5" style="width:100%" oninput="this.nextElementSibling.textContent='距離：'+this.value"><div style="font-size:13px;color:var(--plum);font-weight:600;text-align:center;margin-top:4px;">距離：5</div></div>
      </div>
      <div class="emotion-section">
        <div class="emotion-label">情緒（可多個，不一定每個都問）</div>
        <div class="emo-list" id="emo-${sid}-${ei}"></div>
        <div class="emotion-presets">
          ${PRESET_EMOTIONS.map(em=>`<button class="emo-chip" onclick="addEmo('${sid}',${ei},'${em}')">${em}</button>`).join('')}
          <button class="emo-chip" style="border-style:dashed" onclick="customEmo('${sid}',${ei})">+ 自訂</button>
        </div>
      </div>
    </div>
  </div>`;
}

function addEnt(sid){ snapshots.find(s=>s.id===sid).entities.push({name:''}); render(); }
function rmEnt(sid,ei){ snapshots.find(s=>s.id===sid).entities.splice(ei,1); render(); }
function addEmo(sid,ei,name){
  const list=document.getElementById('emo-'+sid+'-'+ei);
  const d=document.createElement('div'); d.className='emotion-item';
  d.innerHTML=`<span class="emotion-name">${name}</span><input type="range" class="emotion-strength" min="0" max="10" value="5" oninput="this.nextElementSibling.textContent=this.value"><span class="emotion-val">5</span><span class="entity-remove" style="cursor:pointer" onclick="this.parentElement.remove()">×</span>`;
  list.appendChild(d);
}
function customEmo(sid,ei){ const n=prompt('輸入新情緒（會成為以後常用）：'); if(n){ if(!PRESET_EMOTIONS.includes(n)&&!customEmotions.includes(n))customEmotions.push(n); addEmo(sid,ei,n);} }
function posMode(btn,mode){ const s=btn.closest('.position-selector'); s.querySelectorAll('.pos-mode-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); s.querySelector('.grid-view').style.display=mode==='grid'?'flex':'none'; s.querySelector('.bird-wrap').style.display=mode==='bird'?'block':'none'; }
function addMetric(btn){ const n=prompt('指標名稱（例：速度、模糊）：'); if(n){ const c=document.createElement('div'); c.className='metric-chip'; c.innerHTML=`<span class="metric-chip-name">${n}</span><input type="range" min="0" max="10" value="5" oninput="this.nextElementSibling.textContent=this.value" style="width:70px"><span class="metric-chip-val">5</span>`; btn.parentElement.insertBefore(c,btn);} }
function buildGrids(){ document.querySelectorAll('.outer-grid').forEach(g=>{ if(g.children.length)return; for(let r=0;r<5;r++)for(let c=0;c<5;c++){ const cell=document.createElement('div'); cell.className='grid-cell'; if(r>=1&&r<=3&&c>=1&&c<=3)cell.classList.add('inner'); cell.onclick=()=>{ g.querySelectorAll('.grid-cell').forEach(x=>x.classList.remove('selected')); cell.classList.add('selected'); }; g.appendChild(cell);} }); }

function previewPhoto(input){ if(input.files&&input.files[0]){ const r=new FileReader(); r.onload=e=>{ const img=document.createElement('img'); img.src=e.target.result; img.className='photo-preview'; input.closest('.photo-upload').replaceWith(img);}; r.readAsDataURL(input.files[0]);} }

// Picker
function openPicker(sid,frameIdx,type){ currentPicker={snapshotId:sid,frameIdx:frameIdx,type:type}; document.getElementById('cardPickerModal').classList.add('active'); switchPickerTab(type); }
function closeCardPicker(){ document.getElementById('cardPickerModal').classList.remove('active'); }
function switchPickerTab(type){ currentPicker.type=type; document.querySelectorAll('.modal-tab').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.modal-tab')[type==='image'?0:1].classList.add('active'); document.getElementById('pickerCardGrid').style.display=type==='image'?'grid':'none'; document.getElementById('pickerWordList').style.display=type==='word'?'block':'none'; document.getElementById('cardSearchInput').value=''; if(type==='image')renderImgs(''); else renderWords(''); }
function renderImgs(filter){ let h=''; for(let i=1;i<=88;i++){ const kw=KEYWORDS[i]; if(filter){ const t=(kw?(kw.pos+kw.neg+kw.sub+kw.visual):'')+i; if(!t.includes(filter))continue; } h+=`<div class="picker-card" onclick="pickImg(${i})"><div class="picker-card-img"><img src="${cardImgUrl(cardImageId(i))}" loading="lazy" referrerpolicy="no-referrer"></div><div class="picker-card-label">${String(i).padStart(2,'0')}</div></div>`; } document.getElementById('pickerCardGrid').innerHTML=h||'<p style="color:var(--ink-faint);padding:20px">找不到</p>'; }
function renderWords(filter){ let list=WORD_CARDS.filter(w=>!filter||w.includes(filter)); let h=list.map(w=>`<div class="word-chip" onclick="pickWord('${w}')">${w}</div>`).join(''); if(!filter){ h+=BLANK_CARDS.map(w=>`<div class="word-chip blank" onclick="pickWord('${w}')">${w}</div>`).join(''); } document.getElementById('wordChipList').innerHTML=h||'<p style="color:var(--ink-faint)">找不到這張字卡</p>'; }
function filterCards(v){ if(currentPicker.type==='image')renderImgs(v); else renderWords(v); }
function pickImg(num){ const s=snapshots.find(x=>x.id===currentPicker.snapshotId); if(currentPicker.frameIdx==='loose'){ s.looseImages.push(num); } else if(currentPicker.frameIdx!==null){ s.frames[currentPicker.frameIdx].images.push(num); } render(); closeCardPicker(); }
function pickWord(word){ const s=snapshots.find(x=>x.id===currentPicker.snapshotId); s.frames.push({word:word,images:[]}); render(); closeCardPicker(); }
function addFreeWord(){ const inp=document.getElementById('customWordInput'); const w=inp.value.trim(); if(w){ const s=snapshots.find(x=>x.id===currentPicker.snapshotId); s.frames.push({word:w+' (自創)',images:[]}); inp.value=''; render(); closeCardPicker(); } }
function rmFrame(sid,fi){ snapshots.find(s=>s.id===sid).frames.splice(fi,1); render(); }
function rmFrameImg(sid,fi,ii){ snapshots.find(s=>s.id===sid).frames[fi].images.splice(ii,1); render(); }
function rmLoose(sid,li){ snapshots.find(s=>s.id===sid).looseImages.splice(li,1); render(); }

function addMTag(input, type){
  const val = input.value.trim();
  if(!val) return;
  const container = document.getElementById('mtags-'+type);
  const span = document.createElement('span');
  span.className = 'mtag';
  span.innerHTML = val + '<span class="x" onclick="this.parentElement.remove()">×</span>';
  container.appendChild(span);
  input.value = '';
}

addSnapshot();
</script>
</body>
</html>
